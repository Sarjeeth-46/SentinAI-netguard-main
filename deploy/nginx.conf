# NGINX Configuration for SentinAI NetGuard FastAPI & WebSocket
# This file is used for Phase 8: Final System Hardening

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$host$request_uri;

    # Rate limiting zone (requires: limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s; in nginx.conf http block)
    # limit_req zone=mylimit burst=20 nodelay;

    # Backend API Routing
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Dashboard Routing
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Increase timeouts for long-lived WS connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional: Frontend React Serving (if not deployed to Vercel/S3)
    location / {
        proxy_pass http://127.0.0.1:5173; # Assuming Vite preview is running, or point to static dist
        proxy_set_header Host $host;
    }
}
