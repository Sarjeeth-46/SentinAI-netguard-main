# =============================================================================
# Nginx Configuration for SentinAI NetGuard
# Deployment: Single EC2 t2.micro + Let's Encrypt TLS (Free Tier)
#
# Install location: /etc/nginx/sites-available/sentinai
# Enable: sudo ln -s /etc/nginx/sites-available/sentinai /etc/nginx/sites-enabled/
#
# Also add to /etc/nginx/nginx.conf inside the http {} block:
#   limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
#   limit_req_zone $binary_remote_addr zone=ws:10m   rate=5r/s;
# =============================================================================

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;

    # Let's Encrypt ACME challenge (Certbot manages this path automatically)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force all other traffic to HTTPS (was commented out before — now active)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Backend Server ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # TLS certificates — managed by Certbot/Let's Encrypt
    # Run: sudo certbot --nginx -d api.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Hide Nginx version from response headers
    server_tokens off;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header X-XSS-Protection           "1; mode=block"                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;

    # ── Request size limit (matches FastAPI 5MB middleware) ───────────────────
    client_max_body_size 5m;

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        # FIX: was proxy_pass http://127.0.0.1:8000 — wrong port caused 502 errors
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Auth — tighter rate limit to prevent brute force ─────────────────────
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block internal webhook from internet access ───────────────────────────
    location /api/internal/ {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://127.0.0.1:8001;
    }

    # ── Block Prometheus metrics from internet access ─────────────────────────
    location /api/metrics {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://127.0.0.1:8001;
    }

    # ── WebSocket — real-time dashboard ──────────────────────────────────────
    location /ws/ {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   10s;
    }

    # ── Health check — public, no auth, suppress from access logs ────────────
    location /api/health/liveness {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        access_log off;
    }
}
