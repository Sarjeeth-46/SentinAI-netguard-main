groups:
  - name: AegisCoreAlerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: High HTTP 5xx error rate detected
          description: "Over 5% of requests have failed in the last 5 minutes."

      - alert: HighInferenceLatency
        expr: histogram_quantile(0.95, sum(rate(ml_inference_latency_seconds_bucket[5m])) by (le)) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: ML inference latency is high
          description: "95th percentile of inference latency is > 1.0 seconds."
